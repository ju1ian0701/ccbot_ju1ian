name: Agentic Orchestrator

# Full pipeline: analyze → plan → (optional) implement.
# Default is manual. Set repository variable AGENTIC_AUTO_IMPLEMENT=true
# to allow scheduled full runs that chain into implement.

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Optional force task id"
        required: false
        type: string
      implement:
        description: "Chain into Agentic Implement after plan"
        required: false
        type: boolean
        default: false
      dry_run_implement:
        description: "If implementing, only prepare prompts"
        required: false
        type: boolean
        default: true
      sync_issues:
        description: "Sync backlog to GitHub issues during plan"
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly analysis only (implement still gated)
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  analyze_and_plan:
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.out.outputs.task_id }}
      should_implement: ${{ steps.out.outputs.should_implement }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run analyze + select
        env:
          TASK_ID: ${{ inputs.task_id }}
        run: |
          python scripts/agentic/cli.py analyze
          if [ -n "${TASK_ID:-}" ]; then
            python scripts/agentic/cli.py select --task "$TASK_ID"
          else
            python scripts/agentic/cli.py select || true
          fi

      - name: Sync issues (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_issues }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for label in agentic priority:high priority:medium priority:low; do
            gh label create "$label" --force 2>/dev/null || true
          done
          python scripts/agentic/cli.py sync-issues --apply

      - name: Decide implement chain
        id: out
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IMPLEMENT: ${{ inputs.implement }}
          AUTO: ${{ vars.AGENTIC_AUTO_IMPLEMENT }}
        run: |
          TID=""
          if [ -f .agentic/out/selected-task.json ]; then
            TID=$(python -c "import json; print(json.load(open('.agentic/out/selected-task.json')).get('id',''))")
          fi
          echo "task_id=$TID" >> "$GITHUB_OUTPUT"

          SHOULD=false
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_IMPLEMENT" = "true" ]; then
            SHOULD=true
          fi
          # Scheduled runs implement only if repo variable explicitly enables it
          if [ "$EVENT_NAME" = "schedule" ] && [ "$AUTO" = "true" ]; then
            SHOULD=true
          fi
          echo "should_implement=$SHOULD" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: agentic-orchestrator-out
          path: .agentic/out/

      - name: Summary
        run: |
          {
            echo "## Orchestrator"
            echo ""
            echo "- event: \`${{ github.event_name }}\`"
            echo "- selected: \`${{ steps.out.outputs.task_id }}\`"
            echo "- chain_implement: \`${{ steps.out.outputs.should_implement }}\`"
            echo ""
            [ -f .agentic/out/analysis-report.md ] && cat .agentic/out/analysis-report.md
            echo ""
            [ -f .agentic/out/plan.md ] && cat .agentic/out/plan.md
          } >> "$GITHUB_STEP_SUMMARY"

  call_implement:
    needs: analyze_and_plan
    if: needs.analyze_and_plan.outputs.should_implement == 'true' && needs.analyze_and_plan.outputs.task_id != ''
    uses: ./.github/workflows/agentic-implement.yml
    secrets: inherit
    with:
      task_id: ${{ needs.analyze_and_plan.outputs.task_id }}
      # workflow_dispatch: honor dry_run_implement (default true). schedule+AUTO: real implement.
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run_implement || false }}
